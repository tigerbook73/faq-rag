pre-commit:
  commands:
    no-commit-to-main:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ]; then
          echo "Direct commits to main are not allowed. Please use a feature branch."
          exit 1
        fi
    format:
      glob: "*.{ts,tsx,js,jsx,json,css,md,yaml,yml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,tsx}"
      run: pnpm exec eslint --config apps/web/eslint.config.mjs --fix {staged_files}
      stage_fixed: true
